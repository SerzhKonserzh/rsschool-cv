<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <aside>
            <div class="aside_container">
                <img src="img/aside/avatar.jpg" alt="My photo" class="aside_photo">
                <div class="aside_contacts">
                    <h2 class="aside_contacts_text">My contacts:</h2>
                    <ul class="aside_contacts_list">
                        <li><a href="#" class="aside_link"><img src="img/aside/contacts_icons/email.png" alt="" class="mail_img"></a></li>
                        <li><a href="#" class="aside_link"><img src="img/aside/contacts_icons/telegram.png" alt="" class="telegram_img"></a></li>
                        <li><a href="#" class="aside_link"><img src="img/aside/contacts_icons/discord.png" alt="" class="discord_img"></a></li>
                    </ul>
                </div>
            </div>
        </aside>
        <header>
            <div class="header_container">
                <div class="header_title">
                    <h1 class="header_title_name">Sergey Sobolevskiy</h1>
                    <h2 class="header_title_descr">Junior Front-end Developer</h2>
                </div>
            </div>
        </header>
    </div>
</body>
</html>
